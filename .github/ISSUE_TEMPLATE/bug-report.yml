name: 예상과 다르게 동작했어요
description: 어떤 입력에서 무엇이 달랐는지 함께 살펴봅니다.
title: "[버그] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        문제를 재현할 수 있을 만큼의 정보만 있어도 충분합니다.
        공개 저장소이므로 계정 정보와 API 키는 지우고, 원본 게임 화면 대신 필요한 영역을 가려서 첨부해 주세요.

  - type: textarea
    id: problem
    attributes:
      label: 어떤 결과를 예상했나요?
      description: 기대한 결과와 실제로 나온 결과가 어떻게 달랐는지 알려주세요.
      placeholder: 아이템은 찾았지만 바로 아래 수량이 연결되지 않았습니다.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 같은 문제를 다시 확인하려면 어떻게 해야 하나요?
      description: 사용한 명령과 입력의 특징을 순서대로 적어주시면 원인을 좁히는 데 도움이 됩니다.
      placeholder: |
        1. 실행한 명령
        2. 사용한 입력 유형
        3. 발생한 결과
    validations:
      required: true

  - type: textarea
    id: sanitized-output
    attributes:
      label: 확인에 도움이 되는 출력
      description: 캐릭터 ID와 경로 등 개인 정보를 지운 오류 메시지나 JSON 일부가 있다면 남겨주세요.
      render: shell

  - type: input
    id: environment
    attributes:
      label: 어떤 환경에서 실행했나요?
      description: 운영체제, Python 버전, 캡처 화면의 해상도를 알려주세요.
      placeholder: Windows 11 / Python 3.12 / 1280x720
    validations:
      required: true

  - type: checkboxes
    id: safety
    attributes:
      label: 올리기 전에 한 번만 확인해 주세요
      options:
        - label: API 키와 계정 정보가 보이지 않도록 확인했습니다.
          required: true
